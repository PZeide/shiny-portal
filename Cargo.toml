[package]
name = "xdg-desktop-portal-shiny"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.51.1", features = ["full"] }
zbus = { version = "5.14.0", features = ["tokio"] }
zvariant = { version = "5.10.0", features = ["enumflags2"] }
libwayshot = { version = "0.7.3", features = [
    "png",
    "jpeg",
    "avif",
    "qoi",
    "webp",
] }
clap = { version = "4.6.0", features = ["derive"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
futures-util = "0.3.32"
enumflags2 = "0.7.12"
anyhow = "1.0.102"
serde_repr = "0.1.20"
pipewire = "0.9.2"
pipewire-sys = "0.9.2"
wayland-client = "0.31.14"
rustix = "1.1.4"
thiserror = "2.0.18"
